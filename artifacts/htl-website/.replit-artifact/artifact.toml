kind = "web"
previewPath = "/"
title = "Health Tech Liberia Website"
version = "1.0.0"
id = "artifacts/htl-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22021

[services.development]
run = "pnpm --filter @workspace/htl-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/htl-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/htl-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
